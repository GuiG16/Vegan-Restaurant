    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel='stylesheet' href='css/styles.css' />
    <link href='https://fonts.googleapis.com/css?family=Barriecito' rel='stylesheet'>
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <script src="https://kit.fontawesome.com/7d50843986.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollToPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>

<body>
    <nav id="myTopNav">
        <a href="#section1" class="nav-link active">Home</a>
        <a href="#section2" class="nav-link">Menu</a>
        <a href="#section3" class="nav-link">Contact</a>

        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
            <i class="fa fa-bars"></i>
        </a>

        <div class="animation start-home"></div>
    </nav>

    <section id="section1">
        
        <h1 class="top-header">Hello from A Giant Bite!</h1>
        <div class="hero-flex-container fade-in">
            <div class="hero-text">
                <h1 class="hero-header">Everyone is welcome.</h1>
                <p>Whether you're vegetarian or not, you'll love every bite of our giant menu!</p>
                <a href="#section2" class="hero-button">Learn More</a>
            </div>

            <div class="hero-image fade-in">
                <img src="images/AdobeStock_107806944.jpeg" alt="Food image">
            </div>
        </div>
    </section>

    <section id="section2">

        <div class="menu-container fade-in">
            <h1 class="menu-header">A Giant Menu</h1>
            <img class="menu-image" src="images/A Giant Menu (2).png">
        </div>

    </section>

    <section id="section3">

        <div class="contact-form fade-in">
            <h1 class="form-header">Contact</h1>
            <h1 class="form-subheading">Get in Touch</h1>
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">Email address</label>
                <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Your Message</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>
        </div>

        <a href="https://github.com/GuiG16" class="fa-brands fa-github fa-2xl">
        <a href="www.linkedin.com/in/guillaume-evans" class="fa-brands fa-square-linkedin fa-2xl">
        <a href="https://www.instagram.com/evans_gui/" class="fa-brands fa-instagram fa-2xl"></a>
    </section>
    <script src='JS/nav.js'></script>
